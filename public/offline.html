<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline | Check Your Representative</title>
<style>
  body { margin: 0; background: #FBF7EC; font-family: Georgia, 'Times New Roman', serif; color: #1A1A1A; }
  .header { background: #0A1A3F; color: #fff; padding: 18px 20px; border-bottom: 3px solid #C9A227; }
  .title { font-size: 20px; font-weight: 700; }
  .tagline { font-size: 11px; color: #C9A227; letter-spacing: 1px; margin-top: 4px; }
  .card { max-width: 560px; margin: 60px auto; background: #fff; border: 1px solid #D8C9A0;
          border-radius: 8px; padding: 32px 28px; text-align: center; }
  h1 { color: #0A1A3F; font-size: 22px; margin: 0 0 12px; }
  p { font-size: 14.5px; line-height: 1.7; color: #5C5347; margin: 0 0 18px; }
  button { font-family: Georgia, serif; font-weight: 700; font-size: 14px; padding: 10px 22px;
           background: #8B0000; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
</style>
</head>
<body>
  <div class="header">
    <div class="title">Check Your Representative</div>
    <div class="tagline">KNOW YOUR BILLS &middot; KNOW YOUR VOTE &middot; KNOW YOUR MONEY &middot; HOLD THE LINE</div>
  </div>
  <div class="card">
    <h1>You are offline</h1>
    <p>
      Bills, votes, and money data come straight from the public record, so they need a
      connection. Nothing is shown from a stale cache. Reconnect and try again.
    </p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
