# Extracts judicial retention election results from the Colorado Secretary
# of State's certified Abstract of Votes Cast PDF and commits them to
# data/retention_results.csv. The abstract is the official certified record
# of every retention question and its yes/no vote counts.
#
# Prints a debug sample of the extracted text around retention questions on
# every run, so the parser can be tuned against the PDF's real layout from
# the Actions log. Only commits the CSV when at least one row parsed.
name: retention-extract

on:
  workflow_dispatch:
    inputs:
      pdf_url:
        description: Abstract of Votes Cast PDF URL
        required: false
        default: https://www.coloradosos.gov/pubs/elections/Results/2024/2024BiennialAbstract.pdf
        type: string
      election_year:
        description: Election year for the CSV rows
        required: false
        default: "2024"
        type: string

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install poppler
        run: sudo apt-get update -qq && sudo apt-get install -y -qq poppler-utils
      - name: Download and extract
        env:
          PDF_URL: ${{ inputs.pdf_url }}
        run: |
          curl -sSL --max-time 300 -A "Mozilla/5.0 (civic data check)" "$PDF_URL" -o /tmp/abstract.pdf
          echo "PDF size: $(wc -c < /tmp/abstract.pdf)"
          pdftotext -layout /tmp/abstract.pdf /tmp/abstract.txt
          echo "Text size: $(wc -c < /tmp/abstract.txt)"
          echo "== One full contest block, lines 8155 to 8245 =="
          sed -n '8155,8245p' /tmp/abstract.txt || true
          echo "== All Judge or Justice contest headers =="
          grep -nE "(Justice|Judge) - " /tmp/abstract.txt | head -60 || true
      - name: Parse retention results
        env:
          ELECTION_YEAR: ${{ inputs.election_year }}
        run: |
          python3 << 'PYEOF'
          import re, os, csv

          # Verified against the abstract's real layout: each retention
          # contest opens with a header naming the court and judge, then a
          # county table whose Total row carries Yes in column 3 and No in
          # column 4:
          #   Colorado Supreme Court Justice - Brian D. Boatright
          #   County   Registered Voters   Ballots Cast   Yes   No   Total   Turnout %
          #   ...
          #   Total    4,583,280   3,241,155   1,685,363   837,630   2,522,993   70.72%
          # County court judges are outside this site's directory and skipped.
          year = os.environ.get('ELECTION_YEAR', '2024')
          lines = open('/tmp/abstract.txt', encoding='utf-8', errors='replace').read().splitlines()

          H_SUP = re.compile(r"^\s*Colorado Supreme Court Justice\s+-\s+(.+?)\s*$")
          H_APP = re.compile(r"^\s*Colorado Court Of Appeals Judge\s+-\s+(.+?)\s*$", re.IGNORECASE)
          H_DIS = re.compile(r"^\s*District Court Judge\s+-\s+(\d+)(?:st|nd|rd|th)\s+Judicial District\s+-\s+(.+?)\s*$")
          H_CTY = re.compile(r"^\s*County Court Judge\s+-\s+")
          TOTAL = re.compile(r"^\s*Total\s+([\d,]+)\s+([\d,]+)\s+([\d,]+)\s+([\d,]+)\s+([\d,]+)\s")

          def dsuffix(n):
              return {1: "1st", 2: "2nd", 3: "3rd", 21: "21st", 22: "22nd"}.get(n, f"{n}th")

          rows, skipped = [], []
          current = None  # (judge, court)

          def open_contest(judge, court):
              global current
              if current and current != (judge, court):
                  skipped.append(f"{current[0]} | {current[1]} | no total found")
              current = (judge, court)

          for ln in lines:
              m = H_SUP.match(ln)
              if m:
                  open_contest(m.group(1).strip(), "Colorado Supreme Court")
                  continue
              m = H_APP.match(ln)
              if m:
                  open_contest(m.group(1).strip(), "Colorado Court of Appeals")
                  continue
              m = H_DIS.match(ln)
              if m:
                  open_contest(m.group(2).strip(), f"{dsuffix(int(m.group(1)))} Judicial District Court")
                  continue
              if H_CTY.match(ln):
                  if current:
                      skipped.append(f"{current[0]} | {current[1]} | no total found")
                  current = None
                  continue
              m = TOTAL.match(ln)
              if m and current:
                  y = int(m.group(3).replace(",", ""))
                  n = int(m.group(4).replace(",", ""))
                  rows.append({
                      "judge_full_name": current[0], "court_name": current[1],
                      "election_year": year, "yes_votes": y, "no_votes": n,
                      "retained": "yes" if y > n else "no",
                  })
                  current = None

          print(f"parsed: {len(rows)}, skipped: {len(skipped)}")
          for s in skipped[:20]:
              print("SKIP:", s)
          for r in rows[:12]:
              print("ROW:", r)

          if rows:
              os.makedirs("data", exist_ok=True)
              with open("data/retention_results.csv", "w", newline="") as f:
                  w = csv.DictWriter(f, fieldnames=list(rows[0].keys()))
                  w.writeheader()
                  w.writerows(rows)
              print("csv written")
          else:
              print("no rows parsed, csv not written")
          PYEOF
      - name: Commit CSV if produced
        run: |
          if [ -f data/retention_results.csv ]; then
            git config user.name "Claude"
            git config user.email "noreply@anthropic.com"
            git add data/retention_results.csv
            git diff --cached --quiet || git commit -m "Extract judicial retention results from certified SoS abstract"
            git push
          else
            echo "nothing to commit"
          fi
